<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>فاميلي فيود — المقدم | وش الجواب</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Lalezar&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

  <style>
    :root {
      --feud-bg:       #0a1628;
      --feud-blue:     #1a3a8f;
      --feud-blue2:    #2563eb;
      --feud-gold:     #f59e0b;
      --feud-gold-d:   #d97706;
      --feud-orange:   #ea580c;
      --feud-red:      #dc2626;
      --feud-green:    #16a34a;
      --feud-dot:      rgba(255,255,255,0.07);
      --cell-bg:       #1e3a8f;
      --cell-border:   #f59e0b;
      --cell-text:     #fcd34d;
      --revealed-bg:   #1d4ed8;
      --t1: #22c55e;
      --t2: #f97316;
    }

    * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--feud-bg);
      background-image: radial-gradient(circle, var(--feud-dot) 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
      color: #fff;
      padding-bottom: 40px;
    }

    /* ========= هيدر ========= */
    .host-header {
      background: linear-gradient(135deg, #0f1f5c, #1a3a8f);
      border-bottom: 2px solid var(--feud-gold);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .host-logo {
      font-family: 'Lalezar', sans-serif;
      font-size: 1.6rem;
      color: var(--feud-gold);
      -webkit-text-stroke: 1.5px var(--feud-orange);
      paint-order: stroke fill;
      text-shadow: 2px 2px 0 var(--feud-orange);
      letter-spacing: 1px;
    }

    .host-badge {
      background: rgba(245,158,11,0.15);
      border: 1.5px solid var(--feud-gold);
      color: var(--feud-gold);
      padding: 4px 14px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 800;
    }

    .header-links { display: flex; gap: 8px; flex-wrap: wrap; }

    .link-btn {
      padding: 6px 14px; border-radius: 8px; font-weight: 800; font-size: 0.8rem;
      border: 1.5px solid; cursor: pointer; text-decoration: none;
      transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .link-btn.display { border-color: #60a5fa; color: #60a5fa; background: rgba(96,165,250,0.1); }
    .link-btn.display:hover { background: #60a5fa; color: #fff; }
    .link-btn.contest { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.1); }
    .link-btn.contest:hover { background: #4ade80; color: #fff; }
    .link-btn.copy-ok { border-color: #a78bfa; color: #a78bfa; }

    /* ========= Layout ========= */
    .host-body {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      max-width: 1400px;
      margin: 16px auto;
      padding: 0 16px;
    }

    @media (max-width: 1024px) {
      .host-body { grid-template-columns: 1fr; }
    }

    /* ========= لوحة الأسئلة والإجابات ========= */
    .board-wrap {
      background: linear-gradient(135deg, #0f1f5c, #1a3a8f 60%, #0c0c2e);
      border: 3px solid var(--feud-gold);
      border-radius: 20px;
      padding: 20px;
      box-shadow:
        0 0 0 6px rgba(245,158,11,0.1),
        0 8px 32px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* نقاط خلفية */
    .board-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    /* رقم السؤال + المضاعف */
    .board-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; position: relative; z-index: 1;
    }

    .question-counter {
      background: var(--feud-gold);
      color: #1a0035;
      font-size: 1.3rem; font-weight: 900;
      padding: 6px 20px; border-radius: 999px;
      border: 2px solid var(--feud-orange);
      box-shadow: 0 3px 0 var(--feud-orange);
      font-family: 'Lalezar', sans-serif;
    }

    .multiplier-badge {
      background: linear-gradient(135deg, #7c3aed, #4c1d95);
      border: 2px solid #a78bfa;
      color: #e9d5ff;
      font-size: 1.1rem; font-weight: 900;
      padding: 6px 18px; border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Lalezar', sans-serif;
    }
    .multiplier-badge:hover { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    .multiplier-badge.x2 { background: linear-gradient(135deg, #d97706, #b45309); border-color: #fcd34d; color: #fef3c7; }
    .multiplier-badge.x3 { background: linear-gradient(135deg, #dc2626, #b91c1c); border-color: #fca5a5; color: #fee2e2; }

    /* السؤال */
    .question-box {
      background: rgba(0,0,0,0.35);
      border: 2px solid rgba(245,158,11,0.4);
      border-radius: 14px;
      padding: 16px 20px;
      text-align: center;
      margin-bottom: 20px;
      position: relative; z-index: 1;
    }

    .question-text {
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.6;
    }

    /* مجموع نقاط الجولة */
    .round-points-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 16px; position: relative; z-index: 1;
    }

    .round-pts-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem; font-weight: 700;
    }

    .round-pts-value {
      font-family: 'Lalezar', sans-serif;
      font-size: 2rem;
      color: var(--feud-gold);
      text-shadow: 0 0 20px rgba(245,158,11,0.5);
      min-width: 60px; text-align: center;
    }

    /* ========= شبكة الإجابات — عمودان ========= */
    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      position: relative; z-index: 1;
    }

    /* خلية الإجابة */
    .answer-cell {
      background: var(--cell-bg);
      border: 2.5px solid var(--cell-border);
      border-radius: 12px;
      display: flex; align-items: center;
      gap: 0;
      overflow: hidden;
      min-height: 62px;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.08);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .answer-cell:hover:not(.revealed):not(.host-only) {
      border-color: #60a5fa;
      box-shadow: 0 4px 16px rgba(96,165,250,0.3), 0 4px 0 rgba(0,0,0,0.3);
    }

    /* رقم الإجابة */
    .answer-rank {
      width: 52px;
      min-width: 52px;
      height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3);
      border-left: 2px solid rgba(245,158,11,0.3);
      font-family: 'Lalezar', sans-serif;
      font-size: 1.4rem;
      color: var(--cell-text);
      text-shadow: 0 0 10px rgba(252,211,77,0.4);
      padding: 8px 0;
    }

    /* نص الإجابة ونقاطها */
    .answer-body {
      flex: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      gap: 8px;
    }

    .answer-name {
      font-size: 1rem; font-weight: 900;
      color: var(--cell-text);
      filter: blur(6px);
      transition: filter 0.4s ease;
      flex: 1;
    }

    .answer-pts {
      font-family: 'Lalezar', sans-serif;
      font-size: 1.3rem;
      color: rgba(252,211,77,0.5);
      filter: blur(6px);
      transition: filter 0.4s, color 0.4s;
      min-width: 36px;
      text-align: center;
    }

    /* الإجابة المكشوفة */
    .answer-cell.revealed {
      background: var(--revealed-bg);
      border-color: #60a5fa;
      box-shadow:
        0 0 20px rgba(96,165,250,0.4),
        0 4px 0 rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.15);
      animation: revealPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .answer-cell.revealed .answer-name,
    .answer-cell.revealed .answer-pts {
      filter: none;
    }

    .answer-cell.revealed .answer-pts {
      color: var(--feud-gold);
      text-shadow: 0 0 10px rgba(245,158,11,0.5);
    }

    .answer-cell.revealed .answer-rank {
      background: rgba(96,165,250,0.2);
      color: #fff;
    }

    @keyframes revealPop {
      0%   { transform: scaleY(0.85); opacity: 0.5; }
      60%  { transform: scaleY(1.04); }
      100% { transform: scaleY(1); opacity: 1; }
    }

    /* علامة X */
    .x-mark {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(220,38,38,0.85);
      backdrop-filter: blur(2px);
      font-size: 3rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,0,0,0.8);
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 5;
    }
    .answer-cell.wrong .x-mark { opacity: 1; }

    /* ========= عدادات X للأخطاء ========= */
    .strikes-section {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-top: 16px;
      position: relative; z-index: 1;
    }

    .strikes-team {
      display: flex; align-items: center; gap: 10px;
    }

    .team-strikes-label {
      font-size: 0.82rem; font-weight: 800;
      color: rgba(255,255,255,0.6);
    }

    .strikes-dots {
      display: flex; gap: 6px;
    }

    .strike-dot {
      width: 32px; height: 32px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 900; color: transparent;
      transition: all 0.3s;
    }

    .strike-dot.active {
      background: var(--feud-red);
      border-color: #fca5a5;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,0,0,0.6);
      box-shadow: 0 0 12px rgba(220,38,38,0.5);
      animation: strikePop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes strikePop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* ========= اللوحة الجانبية ========= */
    .side-panel {
      display: flex; flex-direction: column; gap: 12px;
    }

    /* كروت النقاط */
    .scores-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }

    .score-card {
      border-radius: 14px; padding: 14px;
      border: 2px solid;
      text-align: center;
    }

    .score-card.t1 {
      background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
      border-color: var(--t1);
    }
    .score-card.t2 {
      background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(249,115,22,0.05));
      border-color: var(--t2);
    }

    .score-name {
      font-size: 0.8rem; font-weight: 800; color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }
    .score-val {
      font-family: 'Lalezar', sans-serif;
      font-size: 2.2rem; font-weight: 900;
      margin-bottom: 8px;
    }
    .score-card.t1 .score-val { color: var(--t1); }
    .score-card.t2 .score-val { color: var(--t2); }

    .score-btns { display: flex; gap: 6px; justify-content: center; }
    .adj-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: #fff;
      font-size: 1.1rem; font-weight: 900; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .adj-btn:hover { background: rgba(255,255,255,0.25); }

    /* سيكشن التحكم */
    .control-section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px;
    }

    .ctrl-title {
      font-size: 0.78rem; font-weight: 800;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    /* أزرار التحكم */
    .ctrl-btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-family: 'Tajawal', sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 8px;
    }
    .ctrl-btn:last-child { margin-bottom: 0; }

    .ctrl-btn.reveal-all {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    .ctrl-btn.reveal-all:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(37,99,235,0.4); }

    .ctrl-btn.award-t1 {
      background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.1));
      color: var(--t1); border: 1.5px solid var(--t1);
    }
    .ctrl-btn.award-t1:hover { background: var(--t1); color: #fff; }

    .ctrl-btn.award-t2 {
      background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(249,115,22,0.1));
      color: var(--t2); border: 1.5px solid var(--t2);
    }
    .ctrl-btn.award-t2:hover { background: var(--t2); color: #fff; }

    .ctrl-btn.reset {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255,255,255,0.15);
    }
    .ctrl-btn.reset:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .ctrl-btn.danger {
      background: rgba(220,38,38,0.15);
      color: #fca5a5; border: 1.5px solid rgba(220,38,38,0.4);
    }
    .ctrl-btn.danger:hover { background: var(--feud-red); color: #fff; }

    /* أزرار الأخطاء */
    .strike-btns {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }

    .strike-btn {
      padding: 8px;
      border-radius: 10px;
      border: 1.5px solid;
      font-family: 'Tajawal', sans-serif;
      font-weight: 800;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .strike-btn.t1 { border-color: var(--t1); color: var(--t1); background: rgba(34,197,94,0.08); }
    .strike-btn.t1:hover { background: var(--t1); color: #fff; }
    .strike-btn.t2 { border-color: var(--t2); color: var(--t2); background: rgba(249,115,22,0.08); }
    .strike-btn.t2:hover { background: var(--t2); color: #fff; }

    /* المضاعف */
    .multiplier-btns {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    }
    .mult-btn {
      padding: 8px;
      border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
      font-family: 'Lalezar', sans-serif; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .mult-btn:hover { border-color: var(--feud-gold); color: var(--feud-gold); }
    .mult-btn.active { background: var(--feud-gold); color: #1a0035; border-color: var(--feud-gold-d); font-weight: 900; }

    /* التنقل بين الأسئلة */
    .nav-btns {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center;
    }
    .nav-btn {
      padding: 10px;
      border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06); color: #fff;
      font-family: 'Tajawal', sans-serif; font-weight: 800;
      font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.15); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .q-counter-small {
      text-align: center; font-size: 0.82rem;
      color: rgba(255,255,255,0.5); font-weight: 800;
      white-space: nowrap;
    }

    /* الفريق المتحكم */
    .controlling-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .ctrl-team-btn {
      padding: 8px;
      border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5);
      font-family: 'Tajawal', sans-serif; font-weight: 800;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .ctrl-team-btn.active-t1 { background: rgba(34,197,94,0.2); border-color: var(--t1); color: var(--t1); }
    .ctrl-team-btn.active-t2 { background: rgba(249,115,22,0.2); border-color: var(--t2); color: var(--t2); }

    /* إشعار الطنطيط */
    .buzz-notification {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 16px; padding: 16px 28px;
      font-size: 1.3rem; font-weight: 900;
      text-align: center; z-index: 9999;
      box-shadow: 0 8px 32px rgba(220,38,38,0.5);
      display: none;
      animation: buzzPulse 0.5s ease-in-out infinite alternate;
    }
    .buzz-notification.show { display: block; }
    @keyframes buzzPulse {
      from { transform: translateX(-50%) scale(1); }
      to   { transform: translateX(-50%) scale(1.03); }
    }

    /* X animation overlay */
    .x-flash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(220,38,38,0.15);
      pointer-events: none; z-index: 8888;
      opacity: 0; transition: opacity 0.15s;
    }
    .x-flash.show { opacity: 1; }
    .x-flash-text {
      font-family: 'Lalezar', sans-serif;
      font-size: 20vw; color: #dc2626;
      text-shadow: 0 0 60px rgba(220,38,38,0.8);
      opacity: 0.6;
    }

    /* نقاط تُمنح */
    .award-flash {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Lalezar', sans-serif;
      font-size: 5rem; color: var(--feud-gold);
      text-shadow: 0 0 40px rgba(245,158,11,0.8);
      pointer-events: none; z-index: 9000;
      opacity: 0; transition: opacity 0.2s;
    }
    .award-flash.show { opacity: 1; animation: awardPop 1.5s ease forwards; }
    @keyframes awardPop {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
      20%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
      70%  { opacity: 1; transform: translate(-50%,-60%) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-80%) scale(0.8); }
    }

    /* إعداد المضاعف على اللوحة */
    .board-multiplier-display {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 2;
      font-family: 'Lalezar', sans-serif;
      font-size: 1.2rem;
      padding: 4px 18px; border-radius: 999px;
      border: 2px solid var(--feud-gold);
      background: rgba(0,0,0,0.5);
      color: var(--feud-gold);
      display: none;
    }
    .board-multiplier-display.show { display: block; }

    /* الفريق المتحكم — شارة على اللوحة */
    .controlling-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 16px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 800; border: 1.5px solid;
      transition: all 0.3s;
    }
    .controlling-badge.t1 { background: rgba(34,197,94,0.15); border-color: var(--t1); color: var(--t1); }
    .controlling-badge.t2 { background: rgba(249,115,22,0.15); border-color: var(--t2); color: var(--t2); }
    .controlling-badge.none { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

<!-- ====== هيدر ====== -->
<div class="host-header">
  <div class="host-logo">فاميلي فيود 🎯</div>
  <div class="host-badge">👨‍🏫 المقدم</div>
  <div class="header-links">
    <button class="link-btn display" onclick="copyLink('display')">
      <i class="fas fa-tv"></i> شاشة العرض
    </button>
    <button class="link-btn contest" onclick="copyLink('contestants')">
      <i class="fas fa-users"></i> المتسابقون
    </button>
  </div>
</div>

<!-- ====== إشعار نسخ ====== -->
<div id="copyToast" style="
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  background:#22c55e;color:#fff;padding:8px 20px;border-radius:999px;
  font-weight:800;font-size:0.85rem;z-index:99999;display:none;">
  ✅ تم نسخ الرابط
</div>

<!-- ====== إشعار الطنطيط ====== -->
<div id="buzzNotif" class="buzz-notification"></div>

<!-- ====== X flash ====== -->
<div id="xFlash" class="x-flash"><span class="x-flash-text">✗</span></div>

<!-- ====== award flash ====== -->
<div id="awardFlash" class="award-flash"></div>

<!-- ====== Body ====== -->
<div class="host-body">

  <!-- ====== اللوحة الرئيسية ====== -->
  <div>
    <div class="board-wrap">

      <!-- المضاعف على اللوحة -->
      <div id="boardMultiplierDisplay" class="board-multiplier-display"></div>

      <!-- أعلى اللوحة -->
      <div class="board-top">
        <div class="question-counter" id="qCounter">س 1</div>
        <div id="controllingBadge" class="controlling-badge none">لا أحد يتحكم</div>
        <div id="multiplierBadge" class="multiplier-badge" onclick="cycleMultiplier()">×1</div>
      </div>

      <!-- السؤال -->
      <div class="question-box">
        <div class="question-text" id="questionText">جاري التحميل...</div>
      </div>

      <!-- نقاط الجولة -->
      <div class="round-points-bar">
        <span class="round-pts-label">نقاط الجولة:</span>
        <span class="round-pts-value" id="roundPts">0</span>
      </div>

      <!-- شبكة الإجابات -->
      <div class="answers-grid" id="answersGrid">
        <!-- تُبنى بالـ JS -->
      </div>

      <!-- عدادات X -->
      <div class="strikes-section">
        <div class="strikes-team">
          <span class="team-strikes-label" id="t1StrikeLabel">الفريق 1:</span>
          <div class="strikes-dots" id="t1Strikes">
            <div class="strike-dot">✗</div>
            <div class="strike-dot">✗</div>
            <div class="strike-dot">✗</div>
          </div>
        </div>
        <div class="strikes-team">
          <span class="team-strikes-label" id="t2StrikeLabel">الفريق 2:</span>
          <div class="strikes-dots" id="t2Strikes">
            <div class="strike-dot">✗</div>
            <div class="strike-dot">✗</div>
            <div class="strike-dot">✗</div>
          </div>
        </div>
      </div>

    </div><!-- /board-wrap -->
  </div>

  <!-- ====== اللوحة الجانبية ====== -->
  <div class="side-panel">

    <!-- النقاط -->
    <div class="scores-row">
      <div class="score-card t1">
        <div class="score-name" id="t1Name">{{ session.team1_name }}</div>
        <div class="score-val" id="t1Score">0</div>
        <div class="score-btns">
          <button class="adj-btn" onclick="adjustScore('team1',1)">+</button>
          <button class="adj-btn" onclick="adjustScore('team1',-1)">−</button>
        </div>
      </div>
      <div class="score-card t2">
        <div class="score-name" id="t2Name">{{ session.team2_name }}</div>
        <div class="score-val" id="t2Score">0</div>
        <div class="score-btns">
          <button class="adj-btn" onclick="adjustScore('team2',1)">+</button>
          <button class="adj-btn" onclick="adjustScore('team2',-1)">−</button>
        </div>
      </div>
    </div>

    <!-- التنقل بين الأسئلة -->
    <div class="control-section">
      <div class="ctrl-title">📋 التنقل</div>
      <div class="nav-btns">
        <button class="nav-btn" id="prevBtn" onclick="navigate('prev')">
          <i class="fas fa-chevron-right"></i> السابق
        </button>
        <div class="q-counter-small" id="qNavCounter">1 / 1</div>
        <button class="nav-btn" id="nextBtn" onclick="navigate('next')">
          التالي <i class="fas fa-chevron-left"></i>
        </button>
      </div>
    </div>

    <!-- الفريق المتحكم -->
    <div class="control-section">
      <div class="ctrl-title">🏆 الفريق المتحكم</div>
      <div class="controlling-row">
        <button class="ctrl-team-btn" id="ctrlT1Btn" onclick="setControllingTeam('team1')">
          {{ session.team1_name }}
        </button>
        <button class="ctrl-team-btn" id="ctrlT2Btn" onclick="setControllingTeam('team2')">
          {{ session.team2_name }}
        </button>
      </div>
    </div>

    <!-- إضافة خطأ -->
    <div class="control-section">
      <div class="ctrl-title">✗ تسجيل خطأ</div>
      <div class="strike-btns">
        <button class="strike-btn t1" onclick="markStrike('team1')">
          ✗ {{ session.team1_name }}
        </button>
        <button class="strike-btn t2" onclick="markStrike('team2')">
          ✗ {{ session.team2_name }}
        </button>
      </div>
      <button class="ctrl-btn reset" style="margin-top:8px;" onclick="resetStrikes()">
        <i class="fas fa-redo"></i> تصفير الأخطاء
      </button>
    </div>

    <!-- المضاعف -->
    <div class="control-section">
      <div class="ctrl-title">⚡ مضاعف النقاط</div>
      <div class="multiplier-btns">
        <button class="mult-btn active" id="mult1" onclick="setMultiplier(1)">×1</button>
        <button class="mult-btn" id="mult2" onclick="setMultiplier(2)">×2</button>
        <button class="mult-btn" id="mult3" onclick="setMultiplier(3)">×3</button>
      </div>
    </div>

    <!-- إعطاء النقاط -->
    <div class="control-section">
      <div class="ctrl-title">🎁 إعطاء نقاط الجولة</div>
      <button class="ctrl-btn award-t1" onclick="awardPoints('team1')">
        <i class="fas fa-trophy"></i> أعطِ لـ {{ session.team1_name }}
      </button>
      <button class="ctrl-btn award-t2" onclick="awardPoints('team2')">
        <i class="fas fa-trophy"></i> أعطِ لـ {{ session.team2_name }}
      </button>
    </div>

    <!-- كشف + إعادة -->
    <div class="control-section">
      <div class="ctrl-title">👁 إجراءات</div>
      <button class="ctrl-btn reveal-all" onclick="revealAll()">
        <i class="fas fa-eye"></i> كشف كل الإجابات
      </button>
      <button class="ctrl-btn reset" onclick="resetBuzz()">
        <i class="fas fa-unlock"></i> فتح زر الطنطيط
      </button>
      <button class="ctrl-btn danger" onclick="confirmNewRound()">
        <i class="fas fa-forward"></i> جولة جديدة (تصفير)
      </button>
    </div>

  </div><!-- /side-panel -->
</div><!-- /host-body -->

<script>
// ========= بيانات الجلسة =========
const SESSION_ID   = '{{ session.id|escapejs }}';
const DISPLAY_URL  = '{{ display_url|escapejs }}';
const CONTEST_URL  = '{{ contestants_url|escapejs }}';
const TOTAL_Q      = {{ questions_count }};

let socket = null;
let reconnectDelay = 1000;

// حالة محلية
let state = {
  questionIndex: 1,
  questionText: '',
  answers: [],          // [{rank, text, points}]
  revealed: [],         // [rank, ...]
  team1Strikes: 0,
  team2Strikes: 0,
  roundPts: 0,
  multiplier: 1,
  controllingTeam: '',
  t1Score: 0,
  t2Score: 0,
  t1Name: '{{ session.team1_name|escapejs }}',
  t2Name: '{{ session.team2_name|escapejs }}',
};

// ========= WebSocket =========
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  socket = new WebSocket(`${proto}://${location.host}/ws/feud/${SESSION_ID}/?role=host`);

  socket.onopen = () => {
    reconnectDelay = 1000;
    startHeartbeat();
  };

  socket.onmessage = (ev) => {
    let d;
    try { d = JSON.parse(ev.data); } catch { return; }

    switch (d.type) {
      case 'full_state':       applyFullState(d);       break;
      case 'answer_revealed':  onAnswerRevealed(d);      break;
      case 'strike_updated':   onStrikeUpdated(d);       break;
      case 'scores_updated':   onScoresUpdated(d);       break;
      case 'multiplier_changed': onMultiplierChanged(d); break;
      case 'controlling_team_changed': onControllingTeam(d); break;
      case 'contestant_buzz_accepted': onBuzz(d);        break;
      case 'buzz_reset_by_host': hideBuzzNotif();        break;
    }
  };

  socket.onclose = () => {
    clearInterval(hbTimer);
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 8000);
  };
  socket.onerror = () => { try { socket.close(); } catch {} };
}

let hbTimer = null;
function startHeartbeat() {
  clearInterval(hbTimer);
  hbTimer = setInterval(() => {
    if (socket && socket.readyState === 1)
      socket.send(JSON.stringify({ type: 'ping' }));
  }, 20000);
}

function send(payload) {
  if (socket && socket.readyState === 1)
    socket.send(JSON.stringify(payload));
}

// ========= تطبيق الحالة الكاملة =========
function applyFullState(d) {
  state.questionIndex  = d.question_index;
  state.questionText   = d.question_text;
  state.answers        = d.answers || [];
  state.revealed       = d.revealed_answers || [];
  state.team1Strikes   = d.team1_strikes;
  state.team2Strikes   = d.team2_strikes;
  state.roundPts       = d.round_points;
  state.multiplier     = d.multiplier;
  state.controllingTeam = d.controlling_team || '';
  state.t1Score        = d.team1_score;
  state.t2Score        = d.team2_score;
  renderAll();
}

// ========= Render =========
function renderAll() {
  // السؤال
  document.getElementById('questionText').textContent = state.questionText || '—';
  document.getElementById('qCounter').textContent = `س ${state.questionIndex}`;
  document.getElementById('qNavCounter').textContent = `${state.questionIndex} / ${TOTAL_Q}`;

  // النقاط
  document.getElementById('t1Score').textContent = state.t1Score;
  document.getElementById('t2Score').textContent = state.t2Score;
  document.getElementById('roundPts').textContent = state.roundPts;

  // الأخطاء
  renderStrikes('t1Strikes', state.team1Strikes);
  renderStrikes('t2Strikes', state.team2Strikes);

  // المضاعف
  renderMultiplier(state.multiplier);

  // الفريق المتحكم
  renderControllingTeam(state.controllingTeam);

  // الإجابات
  renderAnswers();

  // أزرار التنقل
  document.getElementById('prevBtn').disabled = (state.questionIndex <= 1);
  document.getElementById('nextBtn').disabled = (state.questionIndex >= TOTAL_Q);
}

function renderAnswers() {
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';

  // نرتب الإجابات: العمود الأيمن (1,3,5,7) والعمود الأيسر (2,4,6,8)
  // نبني الكل بالترتيب الطبيعي والـ CSS grid يرتبها عمودين
  const sorted = [...state.answers].sort((a, b) => a.rank - b.rank);

  sorted.forEach(ans => {
    const isRevealed = state.revealed.includes(ans.rank);
    const cell = document.createElement('div');
    cell.className = 'answer-cell' + (isRevealed ? ' revealed' : '');
    cell.dataset.rank = ans.rank;
    cell.onclick = () => revealAnswer(ans.rank);

    cell.innerHTML = `
      <div class="answer-rank">${ans.rank}</div>
      <div class="answer-body">
        <div class="answer-name">${ans.text}</div>
        <div class="answer-pts">${ans.points}</div>
      </div>
      <div class="x-mark">✗</div>
    `;
    grid.appendChild(cell);
  });
}

function renderStrikes(elId, count) {
  const dots = document.getElementById(elId).querySelectorAll('.strike-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i < count);
  });
}

function renderMultiplier(m) {
  [1,2,3].forEach(n => {
    document.getElementById(`mult${n}`)
      .classList.toggle('active', n === m);
  });

  const badge = document.getElementById('multiplierBadge');
  badge.textContent = `×${m}`;
  badge.className = 'multiplier-badge' + (m === 2 ? ' x2' : m === 3 ? ' x3' : '');

  const disp = document.getElementById('boardMultiplierDisplay');
  if (m > 1) {
    disp.textContent = `×${m} مضاعف!`;
    disp.classList.add('show');
    disp.style.background = m === 2
      ? 'rgba(217,119,6,0.8)'
      : 'rgba(185,28,28,0.8)';
  } else {
    disp.classList.remove('show');
  }
}

function renderControllingTeam(team) {
  const badge = document.getElementById('controllingBadge');
  const t1btn = document.getElementById('ctrlT1Btn');
  const t2btn = document.getElementById('ctrlT2Btn');

  t1btn.className = 'ctrl-team-btn' + (team === 'team1' ? ' active-t1' : '');
  t2btn.className = 'ctrl-team-btn' + (team === 'team2' ? ' active-t2' : '');

  if (team === 'team1') {
    badge.className = 'controlling-badge t1';
    badge.textContent = '🏆 ' + state.t1Name;
  } else if (team === 'team2') {
    badge.className = 'controlling-badge t2';
    badge.textContent = '🏆 ' + state.t2Name;
  } else {
    badge.className = 'controlling-badge none';
    badge.textContent = 'لا أحد يتحكم';
  }
}

// ========= handlers من WS =========
function onAnswerRevealed(d) {
  if (!state.revealed.includes(d.rank))
    state.revealed.push(d.rank);
  state.roundPts = d.round_points;
  document.getElementById('roundPts').textContent = state.roundPts;

  const cell = document.querySelector(`.answer-cell[data-rank="${d.rank}"]`);
  if (cell) {
    cell.classList.remove('wrong');
    cell.classList.add('revealed');
  }
}

function onStrikeUpdated(d) {
  state.team1Strikes = d.team1_strikes;
  state.team2Strikes = d.team2_strikes;
  renderStrikes('t1Strikes', state.team1Strikes);
  renderStrikes('t2Strikes', state.team2Strikes);

  // X flash
  if (d.team !== null) {
    const flash = document.getElementById('xFlash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 400);
    playStrikeSound();
  }
}

function onScoresUpdated(d) {
  state.t1Score = d.team1_score;
  state.t2Score = d.team2_score;
  document.getElementById('t1Score').textContent = d.team1_score;
  document.getElementById('t2Score').textContent = d.team2_score;
  state.roundPts = 0;
  document.getElementById('roundPts').textContent = '0';

  if (d.awarded_points && d.awarded_points > 0) {
    showAwardFlash(`+${d.awarded_points}`);
  }
}

function onMultiplierChanged(d) {
  state.multiplier = d.multiplier;
  renderMultiplier(d.multiplier);
}

function onControllingTeam(d) {
  state.controllingTeam = d.team || '';
  renderControllingTeam(state.controllingTeam);
}

function onBuzz(d) {
  const notif = document.getElementById('buzzNotif');
  notif.innerHTML = `🚨 <strong>${d.contestant_name}</strong><br><small>${d.team === 'team1' ? state.t1Name : state.t2Name}</small>`;
  notif.classList.add('show');
  playBuzzSound();
}

function hideBuzzNotif() {
  document.getElementById('buzzNotif').classList.remove('show');
}

// ========= أوامر المقدم =========
function revealAnswer(rank) {
  if (state.revealed.includes(rank)) return;
  send({ type: 'reveal_answer', rank });
  playRevealSound();
}

function revealAll() {
  state.answers.forEach(a => {
    if (!state.revealed.includes(a.rank))
      send({ type: 'reveal_answer', rank: a.rank });
  });
}

function markStrike(team) {
  send({ type: 'mark_strike', team });
}

function resetStrikes() {
  send({ type: 'reset_strikes' });
}

function awardPoints(team) {
  if (state.roundPts <= 0) { alert('لا توجد نقاط لتوزيعها'); return; }
  send({ type: 'award_points', team });
}

function adjustScore(team, delta) {
  const cur1 = state.t1Score;
  const cur2 = state.t2Score;
  const t1 = team === 'team1' ? Math.max(0, cur1 + delta) : cur1;
  const t2 = team === 'team2' ? Math.max(0, cur2 + delta) : cur2;
  send({ type: 'update_scores', team1_score: t1, team2_score: t2 });
  // تفاؤلي
  state.t1Score = t1; state.t2Score = t2;
  document.getElementById('t1Score').textContent = t1;
  document.getElementById('t2Score').textContent = t2;
}

function navigate(dir) {
  send({ type: dir === 'next' ? 'next_question' : 'prev_question' });
}

function setControllingTeam(team) {
  const newTeam = state.controllingTeam === team ? '' : team;
  send({ type: 'set_controlling_team', team: newTeam });
}

function setMultiplier(m) {
  send({ type: 'set_multiplier', multiplier: m });
}

function cycleMultiplier() {
  const next = (state.multiplier % 3) + 1;
  setMultiplier(next);
}

function resetBuzz() {
  send({ type: 'buzz_reset' });
  hideBuzzNotif();
}

function confirmNewRound() {
  if (!confirm('تصفير الجولة والانتقال للسؤال التالي؟')) return;
  send({ type: 'next_question' });
}

// ========= نسخ الروابط =========
async function copyLink(type) {
  const url = type === 'display' ? DISPLAY_URL : CONTEST_URL;
  try {
    await navigator.clipboard.writeText(url);
    const toast = document.getElementById('copyToast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 1800);
  } catch { alert(url); }
}

// ========= أصوات =========
function tone(freq, dur, gain=0.4) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; g.gain.value = gain;
    o.start(); o.stop(ctx.currentTime + dur/1000);
  } catch {}
}
function playRevealSound() { tone(880, 200); setTimeout(() => tone(1100, 150), 180); }
function playStrikeSound()  { tone(200, 400, 0.5); }
function playBuzzSound()    { tone(800, 300, 0.5); }

// ========= award flash =========
function showAwardFlash(text) {
  const el = document.getElementById('awardFlash');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ========= تهيئة =========
document.addEventListener('DOMContentLoaded', () => {
  connect();
  document.addEventListener('click', () => {
    try { new (window.AudioContext||window.webkitAudioContext)(); } catch {}
  }, { once: true });
});
</script>
</body>
</html>
