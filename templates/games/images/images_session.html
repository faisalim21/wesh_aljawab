<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحدّي الصور — شاشة العرض</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --t1: #22c55e;
      --t2: #f97316;
    }
    * { font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #052e16 0%, #071a0e 40%, #030f07 100%);
      min-height: 100vh; width: 100vw; height: 100vh;
      overflow: hidden; color: #fff;
      display: flex; flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(21,128,61,0.14) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 85%, rgba(74,222,128,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ===== هيدر ===== */
    .top-bar {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: rgba(5,46,22,0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(34,197,94,0.15);
      flex-shrink: 0;
    }

    /* شعار الجلسة */
    .session-logo {
      display: flex; flex-direction: column; align-items: center; line-height: 1; gap: 1px;
    }
    .sl-l1 {
      font-size: 0.52rem; font-weight: 800; color: #fff; letter-spacing: 2px;
    }
    .sl-l2 {
      font-size: clamp(1rem, 2.2vw, 1.5rem); font-weight: 900;
      color: #fbbf24; letter-spacing: -0.5px; line-height: 1.1;
    }
    .sl-l3 { display: none; align-items: baseline; gap: 3px; }
    .sl-l3.visible { display: flex; }
    .sl-maa { font-size: 0.52rem; font-weight: 700; color: #fff; }
    .sl-name {
      font-size: clamp(0.8rem, 1.6vw, 1.1rem); font-weight: 900; color: #86efac;
      max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* النقاط */
    .scores-wrap {
      display: flex; gap: 12px; align-items: center;
    }
    .score-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      border-radius: 12px; padding: 8px 16px;
      text-align: center; border: 2px solid;
      min-width: 110px;
    }
    .score-card.t1 { border-color: var(--t1); }
    .score-card.t2 { border-color: var(--t2); }
    .score-name { font-size: 0.75rem; font-weight: 800; margin-bottom: 2px; }
    .score-card.t1 .score-name { color: var(--t1); }
    .score-card.t2 .score-name { color: var(--t2); }
    .score-val {
      font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 900; line-height: 1;
    }
    .score-card.t1 .score-val { color: var(--t1); }
    .score-card.t2 .score-val { color: var(--t2); }

    /* لوجو وش الجواب */
    .wesh-logo {
      background: rgba(255,255,255,0.92);
      border-radius: 10px; padding: 5px 8px;
    }
    .wesh-logo img { height: clamp(36px, 5vw, 54px); width: auto; display: block; }

    /* ===== منطقة الصورة ===== */
    .stage {
      flex: 1; position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      padding: clamp(12px, 2vw, 24px);
      overflow: hidden;
    }

    .image-frame {
      position: relative;
      width: 100%; height: 100%;
      max-width: min(92vw, calc(100vh - 130px) * 16/9);
      max-height: calc(100vh - 130px);
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(34,197,94,0.2);
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 1px rgba(34,197,94,0.08), 0 24px 60px rgba(0,0,0,0.5);
    }

    .image-frame img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 14px;
    }

    .img-placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      color: rgba(255,255,255,0.2); font-size: 1.1rem; font-weight: 700;
    }
    .img-placeholder svg { opacity: 0.15; }

    /* رقم الصورة */
    .pic-counter {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(5,46,22,0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 999px; padding: 4px 16px;
      font-size: 0.78rem; font-weight: 800; color: rgba(255,255,255,0.7);
      z-index: 5;
    }
    .pic-counter span { color: #4ade80; }

    /* ===== طبقة البازر ===== */
    .buzz-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(220,38,38,0.97), rgba(185,28,28,0.97));
      animation: bzPulse 0.6s ease-in-out infinite alternate;
    }
    .buzz-overlay.show { display: flex; }
    @keyframes bzPulse { from{filter:brightness(1)} to{filter:brightness(1.06)} }

    .bz-name {
      font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 900;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.5); margin-bottom: 16px;
    }
    .bz-team {
      padding: 10px 28px; border-radius: 28px;
      border: 3px solid rgba(255,255,255,0.75);
      font-size: clamp(1.2rem, 2.5vw, 1.8rem); font-weight: 800;
      margin-bottom: 24px;
    }
    .bz-cd {
      font-size: clamp(5rem, 12vw, 9rem); font-weight: 900;
      text-shadow: 5px 5px 10px rgba(0,0,0,0.8);
      animation: cdPop 1s ease;
    }
    @keyframes cdPop { 0%{transform:scale(0.7);opacity:0} 50%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }

    @media(max-width:768px){
      .scores-wrap { gap: 8px; }
      .score-card { min-width: 80px; padding: 6px 10px; }
      .score-name { font-size: 0.65rem; }
    }
  </style>
</head>
<body>

  <!-- هيدر -->
  <div class="top-bar">

    <!-- شعار الجلسة -->
    <div class="session-logo">
      <span class="sl-l1">تحدّي</span>
      <span class="sl-l2">الصور</span>
      <div class="sl-l3" id="slMaaName">
        <span class="sl-maa">مع</span>
        <span class="sl-name" id="slName"></span>
      </div>
    </div>

    <!-- النقاط -->
    <div class="scores-wrap">
      <div class="score-card t1">
        <div class="score-name" id="t1Name">{{ session.team1_name }}</div>
        <div class="score-val"  id="t1Score">0</div>
      </div>
      <div class="score-card t2">
        <div class="score-name" id="t2Name">{{ session.team2_name }}</div>
        <div class="score-val"  id="t2Score">0</div>
      </div>
    </div>

    <!-- لوجو وش الجواب -->
    <div class="wesh-logo">
      <img src="https://res.cloudinary.com/drbfhq7t1/image/upload/v1754178528/weshaljawab_tltnqt.png" alt="وش الجواب">
    </div>
  </div>

  <!-- منطقة الصورة -->
  <div class="stage">
    <div class="image-frame" id="imageFrame">
      <div class="img-placeholder" id="imgPlaceholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>في انتظار الصورة...</span>
      </div>
      <img id="pic" src="" alt="" style="display:none;" />
      <div class="pic-counter" id="picCounter" style="display:none;">
        صورة <span id="picCur">1</span> من <span id="picTotal">—</span>
      </div>
    </div>
  </div>

  <!-- طبقة البازر -->
  <div id="buzzOverlay" class="buzz-overlay">
    <div id="bzName" class="bz-name">—</div>
    <div id="bzTeam" class="bz-team">—</div>
    <div id="bzCd"   class="bz-cd">3</div>
  </div>

<script>
  const SESSION_ID = '{{ session.id }}';
  const T1_INIT    = '{{ session.team1_name|escapejs }}';
  const T2_INIT    = '{{ session.team2_name|escapejs }}';

  let ws = null, hb = null, delay = 1000, cdInterval = null;

  // ===== أصوات =====
  let actx = null;
  function _ac(){ if(!actx) try{ actx=new(window.AudioContext||window.webkitAudioContext)(); }catch{} if(actx?.state==='suspended') actx.resume(); return actx; }
  function _tone(f,s,d,g=0.5){ const c=_ac(); if(!c) return; try{ const o=c.createOscillator(),gn=c.createGain(); o.connect(gn); gn.connect(c.destination); o.frequency.value=f; gn.gain.setValueAtTime(0,c.currentTime+s); gn.gain.linearRampToValueAtTime(g,c.currentTime+s+0.01); gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+s+d); o.start(c.currentTime+s); o.stop(c.currentTime+s+d+0.05); }catch{} }
  function playBuzz(){ _tone(880,0,0.10,0.5); _tone(1109,0.09,0.10,0.5); _tone(1319,0.18,0.25,0.55); }
  function playEnd(){  _tone(523,0,0.10,0.6);  _tone(415,0.12,0.10,0.6); _tone(330,0.24,0.35,0.7); }
  document.addEventListener('click', _ac, {once:true});
  document.addEventListener('touchstart', _ac, {once:true, passive:true});

  // ===== ألوان الفرق =====
  function applyColors(t1, t2){
    if(t1){ document.documentElement.style.setProperty('--t1', t1); document.querySelector('.score-card.t1').style.borderColor=t1; document.querySelector('.score-card.t1 .score-name').style.color=t1; document.querySelector('.score-card.t1 .score-val').style.color=t1; }
    if(t2){ document.documentElement.style.setProperty('--t2', t2); document.querySelector('.score-card.t2').style.borderColor=t2; document.querySelector('.score-card.t2 .score-name').style.color=t2; document.querySelector('.score-card.t2 .score-val').style.color=t2; }
  }

  // ===== شعار الجلسة =====
  function applySessionLogo(name, sub){
    const nameEl = document.getElementById('slName');
    const maaEl  = document.getElementById('slMaaName');
    if(!nameEl || !maaEl) return;
    if(name){
      nameEl.textContent = name;
      maaEl.classList.add('visible');
    } else {
      nameEl.textContent = '';
      maaEl.classList.remove('visible');
    }
  }

  // ===== الصورة =====
  function showPic(url, idx, total){
    const img = document.getElementById('pic');
    const ph  = document.getElementById('imgPlaceholder');
    const ctr = document.getElementById('picCounter');
    if(!url){ img.style.display='none'; ph.style.display='flex'; ctr.style.display='none'; return; }
    img.onload = ()=>{ ph.style.display='none'; img.style.display='block'; };
    img.onerror = ()=>{ ph.style.display='flex'; img.style.display='none'; };
    img.src = url;
    if(idx && total){ document.getElementById('picCur').textContent=idx; document.getElementById('picTotal').textContent=total; ctr.style.display='block'; }
  }

  async function loadCurrent(){
    try{
      const r = await fetch(`/games/api/images-get-current/?session_id=${encodeURIComponent(SESSION_ID)}`);
      if(r.status===410){ return; }
      if(!r.ok) return;
      const d = await r.json();
      showPic(d.current?.image_url, d.current_index, d.count);
    }catch{}
  }

  // ===== بازر =====
  function showBuzz(name, team){
    playBuzz();
    document.getElementById('bzName').textContent = name || '—';
    const badge = document.getElementById('bzTeam');
    badge.textContent = team==='team1'
      ? document.getElementById('t1Name').textContent
      : document.getElementById('t2Name').textContent;
    badge.style.background = team==='team1'
      ? getComputedStyle(document.documentElement).getPropertyValue('--t1').trim()
      : getComputedStyle(document.documentElement).getPropertyValue('--t2').trim();
    document.getElementById('buzzOverlay').classList.add('show');
    startCd();
  }
  function hideBuzz(){ clearInterval(cdInterval); document.getElementById('buzzOverlay').classList.remove('show'); }
  function startCd(){
    clearInterval(cdInterval); let n=3;
    document.getElementById('bzCd').textContent=n;
    cdInterval = setInterval(()=>{ n--; document.getElementById('bzCd').textContent=n; if(n<=0){ clearInterval(cdInterval); playEnd(); setTimeout(hideBuzz,400); } },1000);
  }

  // ===== إعدادات أولية =====
  async function loadSettings(){
    try{
      const r = await fetch(`/games/api/settings/?session_id=${encodeURIComponent(SESSION_ID)}`);
      if(!r.ok) return;
      const { settings: s } = await r.json();
      if(!s) return;
      applyColors(s.team1_color, s.team2_color);
      if(s.team1_name){ document.getElementById('t1Name').textContent=s.team1_name; }
      if(s.team2_name){ document.getElementById('t2Name').textContent=s.team2_name; }
      if(s.show_name) applySessionLogo(s.show_name, s.show_subtitle);
    }catch{}
  }

  // ===== WebSocket =====
  function connect(){
    const proto = location.protocol==='https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/pictures/${SESSION_ID}/?role=display`);

    ws.onopen = ()=>{
      delay=1000;
      clearInterval(hb);
      hb = setInterval(()=>{ try{ ws.readyState===1 && ws.send(JSON.stringify({type:'ping'})); }catch{} },20000);
    };

    ws.onmessage = (ev)=>{
      let d={}; try{ d=JSON.parse(ev.data||'{}'); }catch{ return; }
      switch(d.type){
        case 'puzzle_updated':
          showPic(d.image_url, d.index, d.total);
          break;
        case 'broadcast_image_index':
          loadCurrent();
          break;
        case 'scores_updated':
          document.getElementById('t1Score').textContent = d.team1_score ?? 0;
          document.getElementById('t2Score').textContent = d.team2_score ?? 0;
          break;
        case 'contestant_buzz_accepted':
          showBuzz(d.contestant_name, d.team);
          break;
        case 'buzz_unlocked':
        case 'buzz_reset_by_host':
          hideBuzz();
          break;
        case 'settings_updated': {
          const s = d.settings || {};
          applyColors(s.team1_color, s.team2_color);
          if(s.team1_name){ document.getElementById('t1Name').textContent=s.team1_name; }
          if(s.team2_name){ document.getElementById('t2Name').textContent=s.team2_name; }
          if(s.show_name !== undefined) applySessionLogo(s.show_name, s.show_subtitle);
          break;
        }
      }
    };

    ws.onclose = ()=>{ clearInterval(hb); setTimeout(connect, delay); delay=Math.min(delay*2,5000); };
    ws.onerror = ()=>{ try{ ws.close(); }catch{} };
  }

  // ===== تهيئة =====
  document.addEventListener('DOMContentLoaded', ()=>{
    loadSettings();
    loadCurrent();
    connect();
  });

  window.addEventListener('beforeunload', ()=>{
    clearInterval(hb); clearInterval(cdInterval);
    try{ ws?.readyState===1 && ws.close(1000,'unload'); }catch{}
  });
</script>
</body>
</html>
